{% assign share_url = page.url | absolute_url %}
{% assign share_title = page.title | uri_escape %}
<div class="share-section">
  <span class="share-label">SHARE</span>
  <div class="share-links">
    <a href="https://www.linkedin.com/shareArticle?mini=true&url={{ share_url }}&title={{ share_title }}" target="_blank" rel="noopener" title="Share on LinkedIn">
      <i class="fab fa-linkedin"></i>
    </a>
    <a href="https://twitter.com/intent/tweet?text={{ share_title }}&url={{ share_url }}" target="_blank" rel="noopener" title="Share on Twitter">
      <i class="fab fa-twitter"></i>
    </a>
    <a href="https://www.facebook.com/sharer/sharer.php?u={{ share_url }}" target="_blank" rel="noopener" title="Share on Facebook">
      <i class="fab fa-facebook"></i>
    </a>
    <a href="https://www.reddit.com/submit?url={{ share_url }}&title={{ share_title }}" target="_blank" rel="noopener" title="Share on Reddit">
      <i class="fab fa-reddit"></i>
    </a>
    <a href="mailto:?subject={{ share_title }}&body={{ share_url }}" title="Share via Email">
      <i class="fas fa-envelope"></i>
    </a>
  </div>
</div>

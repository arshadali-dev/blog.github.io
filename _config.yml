# SITE CONFIGURATION
baseurl: ""
url: "https://arshadali.dev"

# THEME-SPECIFIC CONFIGURATION
theme_settings:
  # Meta
  title: Arshad Ali
  avatar: assets/images/ArshadAli.jpg
  favicon: assets/images/ArshadAli.jpg
  gravatar:
  description: ""

  # Header and footer text
  header_text: >
    <p></p>
  header_text_feature_image: assets/images/Seattle.jpg
  footer_text: >
    Powered by <a href="https://jekyllrb.com/">Jekyll</a> with <a href="https://github.com/rohanchandra/type-theme">Type Theme</a>

  # Icons
  rss: true
  behance:
  bitbucket:
  dribbble:
  facebook:
  flickr:
  gitlab:
  github: "arshadali-dev"
  gitter:
  google_plus:
  instagram:
  linkedin: "http://www.linkedin.com/in/arshadali-dev"
  pinterest:
  reddit: "arshadali-msft"
  soundcloud:
  stack_exchange:
  steam:
  tumblr:
  twitter: "arshadali_dev"
  wordpress:
  youtube:
  email_address: arshad0384@gmail.com

  # Scripts
  google_analytics:
  disqus_shortname:
  katex: false
  search: true

  # Localization strings
  str_follow_on: "Follow on"
  str_rss_follow: "Follow RSS feed"
  str_email: "Email"
  str_next_post: "Next post"
  str_previous_post: "Previous post"
  str_next_page: "Next"
  str_previous_page: "Prev"
  str_continue_reading: "Continue reading"
  str_javascript_required_disqus: "Please enable JavaScript to view comments."
  str_search_no_results: "No results found."

  # Colours, typography and padding
  google_fonts: "Source+Sans+Pro:400,700,700italic,400italic"

  # Post navigation
  post_navigation: true

  # Page sorting
  site_navigation_sort: order

# PAGINATION
paginate: 5
paginate_path: "blog/page:num"

# BUILD SETTINGS
markdown: kramdown
highlighter: rouge
sass:
  sass_dir: _sass
  style: :compressed
plugins: [jekyll-paginate]
exclude:
  - Gemfile
  - Gemfile.lock
  - .venv
  - README.md
  - blogger-skill/examples/
